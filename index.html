<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rep Sheet">
<title>Rep Sheet</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .home-greeting {
    margin-bottom: 32px;
    animation: fadeDown 0.4s 0.05s ease both;
  }
  .greeting-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .greeting-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1;
    letter-spacing: 0.03em;
    color: var(--text);
  }
  .greeting-headline span { color: var(--accent); }

  /* Day cards */
  .day-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }

  .day-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 20px 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.1s;
    animation: fadeUp 0.4s ease both;
  }
  .day-card:nth-child(1) { animation-delay: 0.08s; }
  .day-card:nth-child(2) { animation-delay: 0.14s; }
  .day-card:nth-child(3) { animation-delay: 0.20s; }
  .day-card:nth-child(4) { animation-delay: 0.26s; }

  .day-card:active { transform: scale(0.985); }

  .day-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .day-card.pull::before  { background: var(--accent); }
  .day-card.push::before  { background: var(--accent-push); }
  .day-card.legs::before  { background: var(--accent-legs); }
  .day-card.full::before  { background: var(--accent-full); }

  .day-card.pull  { border-color: #1e2a0a; }
  .day-card.push  { border-color: #2a1a0a; }
  .day-card.legs  { border-color: #1e0a2a; }
  .day-card.full  { border-color: #0a1e2a; }

  .day-card-left { flex: 1; }

  .day-card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .pull  .day-card-name { color: var(--accent); }
  .push  .day-card-name { color: var(--accent-push); }
  .legs  .day-card-name { color: var(--accent-legs); }
  .full  .day-card-name { color: var(--accent-full); }

  .day-card-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .day-card-progress {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .day-card-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 38px;
  }
  .mini-bar {
    flex: 1;
    height: 3px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
    max-width: 80px;
  }
  .mini-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }
  .pull  .mini-fill { background: var(--accent); }
  .push  .mini-fill { background: var(--accent-push); }
  .legs  .mini-fill { background: var(--accent-legs); }
  .full  .mini-fill { background: var(--accent-full); }

  .day-card-arrow {
    font-size: 20px;
    color: var(--muted);
    padding-left: 12px;
    flex-shrink: 0;
  }

  /* Footer */
  .home-footer {
    display: flex;
    justify-content: center;
    padding-top: 4px;
    animation: fadeUp 0.4s 0.3s ease both;
  }
  .edit-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 10px 16px;
    border: 1px solid var(--line);
    border-radius: 20px;
    transition: color 0.2s, border-color 0.2s;
  }
  .edit-link:active { color: var(--text); border-color: var(--muted); }
</style>
</head>
<body>

<div class="offline-pill" id="offlinePill">⚡ Offline</div>

<div class="brand">
  <div class="brand-name">REP<span>SHEET</span></div>
</div>

<div class="home-greeting">
  <div class="greeting-label" id="greetingLabel">Ready to train</div>
  <div class="greeting-headline">CHOOSE<br>YOUR <span>DAY</span></div>
</div>

<div class="day-cards" id="dayCards"></div>

<div class="home-footer">
  <a class="edit-link" href="edit.html">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9.5 1.5l2 2L4 11H2v-2L9.5 1.5z"/>
    </svg>
    Edit Workouts
  </a>
</div>

<div class="install-banner" id="installBanner">
  <div class="install-text"><strong>Install Rep Sheet</strong><br>Tap Share → Add to Home Screen</div>
  <button class="install-close" onclick="hideInstall()">✕</button>
</div>

<script src="js/workouts.js"></script>
<script>
  const PROGRESS_KEY = 'repsheet-v1';
  const INSTALL_KEY  = 'repsheet-install-dismissed';

  function loadProgress() {
    try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); } catch(e) { return {}; }
  }

  function renderCards() {
    const workouts = getWorkouts();
    const progress = loadProgress();
    const container = document.getElementById('dayCards');
    const days = allDayIds();

    container.innerHTML = days.map(id => {
      const w = workouts[id];
      const total = totalExercises(w);
      const done  = Object.keys(progress).filter(k => k.startsWith(id + '-') && progress[k]).length;
      const pct   = total > 0 ? Math.round((done / total) * 100) : 0;

      return `
        <a class="day-card ${id}" href="workout.html?day=${id}">
          <div class="day-card-left">
            <div class="day-card-name">${w.label}</div>
            <div class="day-card-sub">${w.subtitle}</div>
            <div class="day-card-progress">
              <span class="day-card-count">${done} / ${total}</span>
              <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
            </div>
          </div>
          <div class="day-card-arrow">›</div>
        </a>`;
    }).join('');
  }

  function setGreeting() {
    const h = new Date().getHours();
    const label = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greetingLabel').textContent = label;
  }

  function hideInstall() {
    document.getElementById('installBanner').classList.remove('show');
    try { localStorage.setItem(INSTALL_KEY, '1'); } catch(e) {}
  }

  function maybeShowInstall() {
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
    if (isIos && !isStandalone && !localStorage.getItem(INSTALL_KEY)) {
      setTimeout(() => document.getElementById('installBanner').classList.add('show'), 1500);
    }
  }

  function updateOnline() {
    document.getElementById('offlinePill').classList.toggle('show', !navigator.onLine);
  }
  window.addEventListener('online', updateOnline);
  window.addEventListener('offline', updateOnline);

  setGreeting();
  renderCards();
  updateOnline();
  maybeShowInstall();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
